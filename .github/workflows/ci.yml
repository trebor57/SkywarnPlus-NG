# Lint and test on pushes and pull requests (main branch).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Prefer Node 24 for JavaScript actions (GitHub is deprecating Node 20 on runners).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src tests

      - name: Ruff format
        run: ruff format --check src tests

      - name: Mypy (subset)
        run: |
          mypy --follow-imports=skip --ignore-missing-imports \
            src/skywarnplus_ng/utils/url_security.py \
            src/skywarnplus_ng/utils/rate_limit.py

      - name: Pytest
        run: pytest tests/ -v --tb=short
