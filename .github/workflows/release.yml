# Build release tarball and attach to GitHub Release when a version tag is pushed.
#
# Before tagging:
#   1. Bump version in pyproject.toml and src/skywarnplus_ng/__init__.py to match the tag.
#   2. Commit, then: git tag -a vX.Y.Z -m "Release vX.Y.Z" && git push && git push origin vX.Y.Z
# This workflow: verifies pyproject.toml version matches tag, updates README.md download URLs
# for this release, runs create_release.py (tarball includes updated README), creates the GitHub
# Release with generate_release_notes, and uploads the tarball. Release notes live on GitHub—
# do not maintain a "What's New" section in README.

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Verify tag matches version in pyproject.toml
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION=$(grep -E '^version\s*=' pyproject.toml | sed -E 's/.*=\s*["]?([^"]+)["]?/\1/' | tr -d ' ')
          if [ "v${VERSION}" != "${TAG}" ]; then
            echo "::error::Tag ${TAG} does not match version in pyproject.toml (${VERSION}). Bump version and commit before tagging."
            exit 1
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "TAG=${TAG}" >> $GITHUB_ENV

      - name: Update README.md download URLs to this release
        run: |
          # Update release download URLs (e.g. .../download/v1.0.6/...1.0.6.tar.gz -> .../download/v1.0.7/...1.0.7.tar.gz)
          sed -i "s|releases/download/v[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*/skywarnplus-ng-[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\.tar\.gz|releases/download/${TAG}/skywarnplus-ng-${VERSION}.tar.gz|g" README.md
          # Update tarball filenames and directory names in code blocks
          sed -i "s|skywarnplus-ng-[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\.tar\.gz|skywarnplus-ng-${VERSION}.tar.gz|g" README.md
          sed -i "s|cd skywarnplus-ng-[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*|cd skywarnplus-ng-${VERSION}|g" README.md

      - name: Create release tarball
        run: python3 scripts/create_release.py

      - name: Create Release and upload tarball
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          files: |
            skywarnplus-ng-${{ env.VERSION }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync README.md on main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          sed -i "s|releases/download/v[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*/skywarnplus-ng-[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\.tar\.gz|releases/download/${TAG}/skywarnplus-ng-${VERSION}.tar.gz|g" README.md
          sed -i "s|skywarnplus-ng-[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\.tar\.gz|skywarnplus-ng-${VERSION}.tar.gz|g" README.md
          sed -i "s|cd skywarnplus-ng-[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*|cd skywarnplus-ng-${VERSION}|g" README.md
          if git diff --quiet README.md; then
            echo "README.md already matches ${TAG}; nothing to push."
          else
            git add README.md
            git commit -m "docs: sync README download URLs for ${TAG}"
            git push origin main
          fi
